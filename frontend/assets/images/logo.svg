<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0A1F"/>
      <stop offset="100%" stop-color="#0A0B0F"/>
    </linearGradient>

    <!-- Main purple-pink gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Soft glow gradient -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Card face gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1740"/>
      <stop offset="100%" stop-color="#130F2E"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6C63FF" flood-opacity="0.4"/>
    </filter>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="1024" height="1024" rx="230" fill="url(#bgGrad)"/>

  <!-- Ambient glow blob -->
  <ellipse cx="512" cy="500" rx="380" ry="360" fill="url(#glowCenter)"/>

  <!-- ── Card / document base ── -->
  <rect x="240" y="200" width="420" height="530" rx="36"
        fill="url(#cardGrad)" filter="url(#shadow)"/>

  <!-- Card border glow -->
  <rect x="240" y="200" width="420" height="530" rx="36"
        fill="none" stroke="url(#mainGrad)" stroke-width="2.5" opacity="0.6"/>

  <!-- ── Document lines (quiz questions) ── -->
  <!-- Line group 1 -->
  <rect x="295" y="295" width="220" height="13" rx="6.5" fill="url(#mainGrad)" opacity="0.95"/>
  <rect x="295" y="323" width="165" height="10" rx="5"   fill="#ffffff"        opacity="0.18"/>

  <!-- Line group 2 -->
  <rect x="295" y="390" width="220" height="13" rx="6.5" fill="url(#mainGrad)" opacity="0.95"/>
  <rect x="295" y="418" width="180" height="10" rx="5"   fill="#ffffff"        opacity="0.18"/>

  <!-- Line group 3 -->
  <rect x="295" y="485" width="220" height="13" rx="6.5" fill="url(#mainGrad)" opacity="0.95"/>
  <rect x="295" y="513" width="140" height="10" rx="5"   fill="#ffffff"        opacity="0.18"/>

  <!-- ── AI spark badge (bottom-right overlap) ── -->
  <!-- Outer ring glow -->
  <circle cx="618" cy="672" r="100" fill="#0A0B0F" opacity="0.9"/>
  <circle cx="618" cy="672" r="100"
          fill="none" stroke="url(#mainGrad)" stroke-width="3" opacity="0.7"/>

  <!-- Inner fill -->
  <circle cx="618" cy="672" r="85"
          fill="url(#mainGrad)" opacity="0.12"/>

  <!-- Lightning bolt (AI spark) -->
  <path d="M628 610
           L598 672
           L619 672
           L610 734
           L642 666
           L621 666
           Z"
        fill="url(#mainGrad)"
        filter="url(#softGlow)"/>

  <!-- ── Dot accents (neural nodes) ── -->
  <circle cx="180" cy="300" r="8"  fill="#6C63FF" opacity="0.5"/>
  <circle cx="155" cy="360" r="5"  fill="#A855F7" opacity="0.4"/>
  <circle cx="840" cy="250" r="7"  fill="#EC4899" opacity="0.45"/>
  <circle cx="860" cy="320" r="4"  fill="#A855F7" opacity="0.35"/>
  <circle cx="175" cy="680" r="6"  fill="#6C63FF" opacity="0.4"/>
  <circle cx="845" cy="720" r="9"  fill="#EC4899" opacity="0.4"/>
  <circle cx="820" cy="790" r="5"  fill="#A855F7" opacity="0.3"/>

  <!-- Connecting lines between nodes (subtle) -->
  <line x1="180" y1="300" x2="155" y2="360" stroke="#6C63FF" stroke-width="1.5" opacity="0.25"/>
  <line x1="840" y1="250" x2="860" y2="320" stroke="#EC4899" stroke-width="1.5" opacity="0.25"/>
  <line x1="845" y1="720" x2="820" y2="790" stroke="#A855F7" stroke-width="1.5" opacity="0.2"/>
</svg>
