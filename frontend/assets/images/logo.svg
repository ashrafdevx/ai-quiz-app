<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0A1F"/>
      <stop offset="100%" stop-color="#0A0B0F"/>
    </linearGradient>

    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="50%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1C1740"/>
      <stop offset="100%" stop-color="#130F2E"/>
    </linearGradient>

    <!-- Glow on the search icon strokes -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#6C63FF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="512" cy="505" rx="300" ry="280" fill="url(#glowCenter)"/>

  <!-- ── Document card (centered, safe-zone safe) ── -->
  <rect x="315" y="290" width="310" height="380" rx="30"
        fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="315" y="290" width="310" height="380" rx="30"
        fill="none" stroke="url(#mainGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Document lines — 3 question rows -->
  <rect x="368" y="368" width="195" height="11" rx="5.5" fill="url(#mainGrad)" opacity="0.95"/>
  <rect x="368" y="392" width="145" height="9"  rx="4.5" fill="#ffffff"        opacity="0.18"/>

  <rect x="368" y="444" width="195" height="11" rx="5.5" fill="url(#mainGrad)" opacity="0.95"/>
  <rect x="368" y="468" width="160" height="9"  rx="4.5" fill="#ffffff"        opacity="0.18"/>

  <rect x="368" y="520" width="195" height="11" rx="5.5" fill="url(#mainGrad)" opacity="0.95"/>
  <rect x="368" y="544" width="120" height="9"  rx="4.5" fill="#ffffff"        opacity="0.18"/>

  <!-- ── Search badge — bottom-right of card (same position as spark badge) ── -->
  <!-- Dark backing -->
  <circle cx="582" cy="636" r="78" fill="#0A0B0F" opacity="0.92"/>
  <!-- Subtle inner gradient fill -->
  <circle cx="582" cy="636" r="64" fill="url(#mainGrad)" opacity="0.12"/>
  <!-- Gradient ring border -->
  <circle cx="582" cy="636" r="78"
          fill="none" stroke="url(#mainGrad)" stroke-width="2.5" opacity="0.70"/>

  <!-- ── Search icon inside badge ── -->
  <!-- Lens circle — centered slightly up-left within badge for visual balance -->
  <circle cx="570" cy="622" r="26"
          fill="none" stroke="url(#mainGrad)" stroke-width="10"
          filter="url(#softGlow)"/>
  <!-- Handle — starts at outer edge of lens (45° SE) and extends outward -->
  <line x1="589" y1="641" x2="607" y2="659"
        stroke="url(#mainGrad)" stroke-width="10" stroke-linecap="round"
        filter="url(#softGlow)"/>

  <!-- ── Neural dot accents ── -->
  <circle cx="232" cy="318" r="7"  fill="#6C63FF" opacity="0.5"/>
  <circle cx="208" cy="374" r="4"  fill="#A855F7" opacity="0.4"/>
  <circle cx="792" cy="272" r="6"  fill="#EC4899" opacity="0.45"/>
  <circle cx="812" cy="338" r="3"  fill="#A855F7" opacity="0.35"/>
  <circle cx="228" cy="688" r="5"  fill="#6C63FF" opacity="0.4"/>
  <circle cx="796" cy="726" r="8"  fill="#EC4899" opacity="0.4"/>
  <circle cx="772" cy="792" r="4"  fill="#A855F7" opacity="0.3"/>

  <line x1="232" y1="318" x2="208" y2="374" stroke="#6C63FF" stroke-width="1.5" opacity="0.25"/>
  <line x1="792" y1="272" x2="812" y2="338" stroke="#EC4899" stroke-width="1.5" opacity="0.25"/>
  <line x1="796" y1="726" x2="772" y2="792" stroke="#A855F7" stroke-width="1.5" opacity="0.20"/>
</svg>
